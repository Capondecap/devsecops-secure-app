name: Security Pipeline

on:
  push:

jobs:
  security-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Bandit and pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt bandit pip-audit

      - name: Run Bandit
        id: bandit
        continue-on-error: true
        run: bandit -r app -ll

      - name: Run pip-audit
        id: pip_audit
        continue-on-error: true
        run: pip-audit -r app/requirements.txt

      - name: Build Docker image
        run: docker build -t devsecops-secure-app:latest ./app

      - name: Install Trivy
        run: |
          sudo apt-get update
          sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo gpg --dearmor -o /usr/share/keyrings/trivy.gpg
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install -y trivy

      - name: Scan Docker image
        id: trivy
        continue-on-error: true
        run: trivy image --exit-code 1 --severity UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL devsecops-secure-app:latest

      - name: Fail if vulnerabilities were detected
        if: always()
        run: |
          if [ "${{ steps.bandit.outcome }}" = "failure" ] || [ "${{ steps.pip_audit.outcome }}" = "failure" ] || [ "${{ steps.trivy.outcome }}" = "failure" ]; then
            echo "One or more security scans detected vulnerabilities."
            exit 1
          fi
